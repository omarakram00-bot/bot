<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="Personal Course Organizer.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Course</title>
  </head>
  <body class="add">
    <nav class="bar-add">
        <a href="index.html">Home</a>
        <a href="My Courses.html">My Courses</a>
        <a href="Contact Us.html">Contact Us</a>
    </nav>
    <br>
    <main class="W">
    <fieldset>
        <legend>Add Course</legend>
        <p class="inform"><b>please enter information about course<b></p>
        <br>
        <form>
            <label for="name">Course Name:</label>
            <input type="text" id="name" required placeholder="enter course name" autofocus>
            <br><br><br><br>
            <label for="Lecturer's name">Lecturer's name:</label>
            <input type="text" id="Lecturer's name" required placeholder="enter Lecturer's name">
            <br><br><br><br>
            <label for="hours">Number of credit hours</label>
            <input type="number" id="hours" required placeholder="Number of credit hours">
            <br><br><br>
            <label for="note">Notes</label>
            <br>
            <textarea id="note" maxlength="100" minlength="5" cols="100" rows="20" placeholder="enter your notes"></textarea>
            <br><br>
            <button>Add course</button>
        </form>    
    </fieldset>
    </main>
  </body>
</html>
